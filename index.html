<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>掼蛋游戏 - Guandan</title>
    <script>
      (function(){
        console.log('[guard] init');
        var _gsLastResponse=Date.now(),_gsUnstickCount=0,_gsGameClosed=false,_gsCleanedUp=false;
        var _gsOrigFetch=window.fetch;
        window.fetch=function(){
          var p=_gsOrigFetch.apply(this,arguments);
          var url=typeof arguments[0]==='string'?arguments[0]:arguments[0]&&arguments[0].url||'';
          if(url.indexOf('/nextstate')>=0||url.indexOf('/tables')>=0){
            var m=url.match(/\/tables\/([^\/\?]+)/);
            if(m){
              var tid=m[1];
              _gsLastResponse=Date.now();
              _gsGameClosed=false;
              _gsCleanedUp=false;
              sessionStorage.setItem('td',tid);
              console.log('[guard] tableId stored:',tid);
            } else {
              _gsLastResponse=Date.now();
              _gsUnstickCount=0;
            }
            p.then(function(){_gsLastResponse=Date.now();_gsUnstickCount=0}).catch(function(){});
          }
          return p;
        };

        function onGameClosed(){
          var tid=sessionStorage.getItem('td');
          if(!tid||_gsCleanedUp)return;
          _gsGameClosed=true;
          console.log('[guard] game closed, will cleanup table:',tid);
        }

        function doCleanup(tid){
          if(_gsCleanedUp)return;
          _gsCleanedUp=true;
          console.log('[guard] cleaning up table:',tid);
          fetch('/kb.php?table_id='+encodeURIComponent(tid),{keepalive:true}).catch(function(){});
          sessionStorage.removeItem('td');
        }

        function checkStuck(){
          var tid=sessionStorage.getItem('td');
          if(!tid||_gsCleanedUp)return;
          var now=Date.now();
          if(_gsGameClosed && now-_gsLastResponse>5000){
            doCleanup(tid);
            return;
          }
          if(now-_gsLastResponse>15000){
            _gsUnstickCount++;
            console.warn('[guard] stuck #'+_gsUnstickCount);
            fetch('/unstick.php?table_id='+encodeURIComponent(tid)).then(function(r){return r.json()}).then(function(d){if(d&&d.ok)_gsLastResponse=Date.now()}).catch(function(){});
            if(_gsUnstickCount>=5){console.warn('[guard] reload');location.reload()}
          }
        }
        setInterval(checkStuck,3000);

        new MutationObserver(function(muts){
          for(var i=0;i<muts.length;i++){
            var removed=muts[i].removedNodes;
            if(removed.length>0){
              for(var j=0;j<removed.length;j++){
                var node=removed[j];
                if(node.nodeType===1){
                  var html=node.outerHTML||node.textContent||'';
                  if(html.indexOf('game-container')>=0||html.indexOf('seat-card')>=0){
                    console.log('[guard] game component removed from DOM');
                    setTimeout(onGameClosed,800);
                    return;
                  }
                }
              }
            }
          }
        }).observe(document.getElementById('root')||document.body,{childList:true,subtree:true});

        window.addEventListener('beforeunload',function(){
          var tid=sessionStorage.getItem('td');
          if(tid&&_gsGameClosed&&!_gsCleanedUp){
            console.log('[guard] beforeunload cleanup:',tid);
            fetch('/kb.php?table_id='+encodeURIComponent(tid),{keepalive:true}).catch(function(){});
          }
          sessionStorage.removeItem('td');
        });

        console.log('[guard] ready');
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-Dxu5KgbK.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DZzJMTFf.css?v=2">
    <style>
      @media (max-width: 768px) {
        .hand-cards-area {
          left: 0; right: 0;
          bottom: calc(0px - 0.5 * var(--card-h));
          position: absolute;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }
        .hand-cards-vert {
          display: flex;
          width: fit-content;
          padding: 0 8px;
          justify-content: flex-start;
          margin: 0 auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

  </body>
</html>
